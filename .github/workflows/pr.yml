# Code generated by pocket. DO NOT EDIT.
# Run `./pok github-workflows` to regenerate.
# See: https://github.com/fredrikaverpil/pocket

name: pr

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  title:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          requireScope: false
          subjectPattern: ^(?![A-Z]).{1,64}$
          subjectPatternError: |
            The subject must not start with an uppercase letter and must be at most 64 characters.
            (Total limit is 72 characters including the type and scope prefix.)
          scopes: |
            .+
          types: |
            build
            chore
            ci
            docs
            feat
            fix
            perf
            refactor
            revert
            style
            test
          ignoreLabels: |
            autorelease: pending
