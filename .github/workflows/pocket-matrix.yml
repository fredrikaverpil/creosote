            .pocket/tools
            .pocket/venvs
          key: ${{ runner.os }}-pocket-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-pocket-
      - name: Run github-workflows
        shell: bash
        run: ./pok -v -g github-workflows -include-pocket-matrix -skip-pocket
      - name: Save cache
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            .pocket/bin
            .pocket/tools
            .pocket/venvs
          key: ${{ runner.os }}-pocket-${{ hashFiles('**/go.sum') }}

